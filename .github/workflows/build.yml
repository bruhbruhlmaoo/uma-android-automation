name: Build Android APK

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Download and setup OpenCV Android SDK
        run: |
          wget -q https://github.com/opencv/opencv/releases/download/4.12.0/opencv-4.12.0-android-sdk.zip
          unzip -q opencv-4.12.0-android-sdk.zip
          mkdir -p android/opencv
          mv OpenCV-android-sdk/sdk/* android/opencv/
          rm -rf OpenCV-android-sdk opencv-4.12.0-android-sdk.zip

      - name: Install Yarn dependencies
        run: yarn install

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.14.3'

      - name: Generate Gradle Wrapper
        run: |
          cd android
          gradle wrapper --gradle-version 8.14.3

      - name: Generate React Native Bundle
        run: node android/generate-bundle.js

      - name: Build Android Release APK
        run: |
          cd android
          ./gradlew assembleRelease --stacktrace 2>&1 | tee build_output.log
        continue-on-error: true

      - name: Show build errors if failed
        if: failure()
        run: |
          echo "=== Last 200 lines of build output ==="
          tail -200 android/build_output.log || true
          echo "=== Searching for errors ==="
          grep -i "error\|FAILED\|Exception" android/build_output.log | tail -50 || true

      - name: Upload Build Log on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: android/build_output.log

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: UMA-Bot-Release-APK
          path: android/app/build/outputs/apk/release/*.apk
