name: Build Android APK

on:
  push:
    branches:
      - '**'  # Run on all branches
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Download and setup OpenCV Android SDK
        run: |
          wget -q https://github.com/opencv/opencv/releases/download/4.12.0/opencv-4.12.0-android-sdk.zip
          unzip -q opencv-4.12.0-android-sdk.zip
          mkdir -p android/opencv
          mv OpenCV-android-sdk/sdk/* android/opencv/
          rm -rf OpenCV-android-sdk opencv-4.12.0-android-sdk.zip

      - name: Install Yarn dependencies
        run: yarn install

      - name: Build Android Release APK
        run: |
          # Use yarn build to trigger the release build from package.json
          yarn build

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: UMA-Bot-Release-APK
          path: android/app/build/outputs/apk/release/*.apk
