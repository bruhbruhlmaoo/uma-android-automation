<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>UAA - Remote Log Viewer</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
        <style>
            :root {
                --bg-primary: #0a0a0f;
                --bg-secondary: #12121a;
                --bg-tertiary: #1a1a26;
                --bg-hover: #22222e;
                --border-color: #2a2a3a;
                --border-accent: #3a3a5a;
                --text-primary: #e4e4ef;
                --text-secondary: #8888a0;
                --text-muted: #55556a;
                --accent-blue: #6c8cff;
                --accent-purple: #9b6dff;
                --accent-gradient: linear-gradient(135deg, #6c8cff, #9b6dff);
                --log-debug: #6b7280;
                --log-info: #38bdf8;
                --log-warn: #f59e0b;
                --log-error: #ef4444;
                --log-verbose: #8b5cf6;
                --status-connected: #22c55e;
                --status-disconnected: #ef4444;
                --status-connecting: #f59e0b;
                --scrollbar-thumb: #333350;
                --scrollbar-track: #0a0a0f;
                --font-sans: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
                --font-mono: "JetBrains Mono", "Cascadia Code", "Fira Code", monospace;
                --radius: 8px;
                --transition: 150ms cubic-bezier(0.4, 0, 0.2, 1);
            }

            *,
            *::before,
            *::after {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            html,
            body {
                height: 100%;
                overflow: hidden;
            }

            body {
                font-family: var(--font-sans);
                background: var(--bg-primary);
                color: var(--text-primary);
                display: flex;
                flex-direction: column;
            }

            ::-webkit-scrollbar {
                width: 8px;
            }
            ::-webkit-scrollbar-track {
                background: var(--scrollbar-track);
            }
            ::-webkit-scrollbar-thumb {
                background: var(--scrollbar-thumb);
                border-radius: 4px;
            }
            ::-webkit-scrollbar-thumb:hover {
                background: #444466;
            }

            .header {
                background: var(--bg-secondary);
                border-bottom: 1px solid var(--border-color);
                padding: 12px 20px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                flex-shrink: 0;
                gap: 16px;
            }

            .header-left {
                display: flex;
                align-items: center;
                gap: 12px;
                min-width: 0;
            }

            .logo {
                font-size: 18px;
                font-weight: 700;
                background: var(--accent-gradient);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                white-space: nowrap;
            }

            .logo-sub {
                font-size: 12px;
                color: var(--text-muted);
                font-weight: 400;
                white-space: nowrap;
            }

            .status-badge {
                display: flex;
                align-items: center;
                gap: 6px;
                padding: 4px 10px;
                border-radius: 20px;
                font-size: 11px;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                transition: all var(--transition);
            }

            .status-dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                transition: background var(--transition);
            }

            .status-connected .status-dot {
                background: var(--status-connected);
                box-shadow: 0 0 8px var(--status-connected);
            }
            .status-connected {
                background: rgba(34, 197, 94, 0.1);
                color: var(--status-connected);
                border: 1px solid rgba(34, 197, 94, 0.2);
            }

            .status-disconnected .status-dot {
                background: var(--status-disconnected);
                box-shadow: 0 0 8px var(--status-disconnected);
            }
            .status-disconnected {
                background: rgba(239, 68, 68, 0.1);
                color: var(--status-disconnected);
                border: 1px solid rgba(239, 68, 68, 0.2);
            }

            .status-connecting .status-dot {
                background: var(--status-connecting);
                box-shadow: 0 0 8px var(--status-connecting);
                animation: pulse 1.5s ease-in-out infinite;
            }
            .status-connecting {
                background: rgba(245, 158, 11, 0.1);
                color: var(--status-connecting);
                border: 1px solid rgba(245, 158, 11, 0.2);
            }

            @keyframes pulse {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.3;
                }
            }

            .toolbar {
                background: var(--bg-secondary);
                border-bottom: 1px solid var(--border-color);
                display: flex;
                flex-direction: column;
                flex-shrink: 0;
                position: relative;
            }

            .toolbar-animator {
                display: grid;
                grid-template-rows: 1fr;
                transition: grid-template-rows 0.33s cubic-bezier(0.4, 0, 0.2, 1);
            }

            .toolbar.collapsed .toolbar-animator {
                grid-template-rows: 0fr;
            }

            .toolbar-content {
                min-height: 0; /* Required for grid track animation */
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 8px 20px;
                flex-wrap: wrap;
                overflow: hidden;
                transition: padding 0.33s ease, opacity 0.2s ease;
                opacity: 1;
            }

            .toolbar.collapsed .toolbar-content {
                padding-top: 0;
                padding-bottom: 0;
                opacity: 0;
                pointer-events: none;
            }

            .toolbar-toggle-container {
                display: flex;
                justify-content: center;
                width: 100%;
                height: 0;
                position: relative;
                z-index: 5;
            }

            .toolbar-toggle {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 40px;
                height: 16px;
                background: var(--bg-tertiary);
                border: 1px solid var(--border-color);
                border-top: none;
                border-bottom-left-radius: 8px;
                border-bottom-right-radius: 8px;
                color: var(--text-muted);
                cursor: pointer;
                transition: all var(--transition);
                font-size: 8px;
                line-height: 1;
            }

            .toolbar-toggle:hover {
                background: var(--bg-hover);
                color: var(--text-primary);
                height: 18px;
            }

            .toolbar-toggle span {
                transition: transform 0.3s ease;
                display: inline-block;
            }

            .toolbar.collapsed .toolbar-toggle span {
                transform: rotate(180deg);
            }

            .search-container {
                position: relative;
                flex: 1;
                min-width: 200px;
                max-width: 400px;
            }

            .search-icon {
                position: absolute;
                left: 10px;
                top: 50%;
                transform: translateY(-50%);
                color: var(--text-muted);
                font-size: 14px;
                pointer-events: none;
            }

            .search-input {
                width: 100%;
                padding: 6px 32px 6px 32px;
                background: var(--bg-tertiary);
                border: 1px solid var(--border-color);
                border-radius: var(--radius);
                color: var(--text-primary);
                font-family: var(--font-sans);
                font-size: 13px;
                outline: none;
                transition: border-color var(--transition);
            }
            .search-input::placeholder {
                color: var(--text-muted);
            }
            .search-input:focus {
                border-color: var(--accent-blue);
            }

            .search-clear {
                position: absolute;
                right: 10px;
                top: 50%;
                transform: translateY(-50%);
                color: var(--text-muted);
                cursor: pointer;
                font-size: 14px;
                display: none;
                transition: color var(--transition);
                user-select: none;
            }
            .search-clear:hover {
                color: var(--text-primary);
            }
            .search-clear.visible {
                display: block;
            }

            .filter-group {
                display: flex;
                gap: 4px;
            }

            .filter-btn {
                padding: 4px 10px;
                border-radius: 6px;
                border: 1px solid var(--border-color);
                background: var(--bg-tertiary);
                color: var(--text-secondary);
                font-size: 11px;
                font-weight: 600;
                cursor: pointer;
                transition: all var(--transition);
                text-transform: uppercase;
                letter-spacing: 0.3px;
            }
            .filter-btn:hover {
                background: var(--bg-hover);
            }
            .filter-btn.active {
                border-color: var(--accent-blue);
                color: var(--text-primary);
                background: rgba(108, 140, 255, 0.1);
            }

            .filter-btn[data-level="VERBOSE"].active {
                border-color: var(--log-verbose);
                color: var(--log-verbose);
                background: rgba(139, 92, 246, 0.1);
            }
            .filter-btn[data-level="DEBUG"].active {
                border-color: var(--log-debug);
                color: var(--log-debug);
                background: rgba(107, 114, 128, 0.15);
            }
            .filter-btn[data-level="INFO"].active {
                border-color: var(--log-info);
                color: var(--log-info);
                background: rgba(56, 189, 248, 0.1);
            }
            .filter-btn[data-level="WARN"].active {
                border-color: var(--log-warn);
                color: var(--log-warn);
                background: rgba(245, 158, 11, 0.1);
            }
            .filter-btn[data-level="ERROR"].active {
                border-color: var(--log-error);
                color: var(--log-error);
                background: rgba(239, 68, 68, 0.1);
            }

            .toolbar-separator {
                width: 1px;
                height: 24px;
                background: var(--border-color);
                flex-shrink: 0;
            }

            .toolbar-btn {
                padding: 5px 12px;
                border-radius: var(--radius);
                border: 1px solid var(--border-color);
                background: var(--bg-tertiary);
                color: var(--text-secondary);
                font-size: 12px;
                font-weight: 500;
                cursor: pointer;
                transition: all var(--transition);
                white-space: nowrap;
                display: flex;
                align-items: center;
                gap: 5px;
            }
            .toolbar-btn:hover {
                background: var(--bg-hover);
                color: var(--text-primary);
            }
            .toolbar-btn.active {
                border-color: var(--accent-blue);
                color: var(--accent-blue);
            }

            .font-size-container {
                display: flex;
                align-items: center;
                gap: 6px;
                background: var(--bg-tertiary);
                border: 1px solid var(--border-color);
                border-radius: var(--radius);
                padding: 4px 10px;
                height: 34px;
            }
            .font-size-container span {
                font-size: 11px;
                font-weight: 600;
                color: var(--text-muted);
                text-transform: uppercase;
                letter-spacing: 0.3px;
                user-select: none;
            }
            .size-btn {
                width: 26px;
                height: 26px;
                display: flex;
                align-items: center;
                justify-content: center;
                background: var(--bg-secondary);
                border: 1px solid var(--border-color);
                border-radius: 4px;
                color: var(--text-secondary);
                font-size: 16px;
                font-weight: 700;
                cursor: pointer;
                transition: all var(--transition);
                line-height: 1;
                padding-bottom: 2px;
            }
            .size-btn:hover {
                background: var(--bg-hover);
                color: var(--text-primary);
                border-color: var(--border-accent);
            }
            .size-btn:active {
                transform: scale(0.95);
            }
            .font-size-display {
                display: none;
            }
            .font-size-input {
                width: 40px;
                background: transparent;
                border: none;
                color: var(--text-primary);
                font-family: var(--font-mono);
                font-size: 12px;
                font-weight: 600;
                outline: none;
                text-align: center;
                appearance: textfield;
                padding: 0;
                margin: 0;
            }
            .font-size-input::-webkit-inner-spin-button,
            .font-size-input::-webkit-outer-spin-button {
                appearance: none;
                margin: 0;
            }

            .message-count {
                font-size: 12px;
                color: var(--text-muted);
                font-weight: 500;
                white-space: nowrap;
                margin-left: auto;
            }
            .message-count span {
                color: var(--text-secondary);
                font-weight: 600;
            }

            .log-container {
                flex: 1;
                overflow-y: auto;
                padding: 8px 20px;
                scroll-behavior: auto;
                --log-font-size: 12.5px;
            }

            .log-entry {
                display: flex;
                align-items: flex-start;
                padding: 3px 0;
                font-family: var(--font-mono);
                font-size: var(--log-font-size);
                line-height: 1.6;
                border-bottom: 1px solid rgba(42, 42, 58, 0.3);
                animation: fadeIn 0.2s ease-out;
                word-break: break-word;
            }

            .log-entry.hidden {
                display: none;
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(2px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .log-entry .level-tag {
                font-weight: 600;
                font-size: 11px;
                padding: 1px 5px;
                border-radius: 3px;
                margin-right: 4px;
                flex-shrink: 0;
                margin-top: 1px;
            }

            .log-entry.level-verbose {
                color: var(--log-verbose);
            }
            .log-entry.level-verbose .level-tag {
                background: rgba(139, 92, 246, 0.15);
                color: var(--log-verbose);
            }

            .log-entry.level-debug {
                color: var(--log-debug);
            }
            .log-entry.level-debug .level-tag {
                background: rgba(107, 114, 128, 0.2);
                color: var(--log-debug);
            }

            .log-entry.level-info {
                color: var(--log-info);
            }
            .log-entry.level-info .level-tag {
                background: rgba(56, 189, 248, 0.15);
                color: var(--log-info);
            }

            .log-entry.level-warn {
                color: var(--log-warn);
            }
            .log-entry.level-warn .level-tag {
                background: rgba(245, 158, 11, 0.15);
                color: var(--log-warn);
            }

            .log-entry.level-error {
                color: var(--log-error);
            }
            .log-entry.level-error .level-tag {
                background: rgba(239, 68, 68, 0.15);
                color: var(--log-error);
            }

            .log-timestamp {
                color: var(--text-muted);
                margin-right: 8px;
                flex-shrink: 0;
                margin-top: 1px;
            }

            .log-text {
                color: var(--text-primary);
                white-space: pre-wrap;
                flex-grow: 1;
            }

            .empty-state {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100%;
                color: var(--text-muted);
                gap: 12px;
            }

            .empty-state-icon {
                font-size: 48px;
                opacity: 0.5;
            }

            .empty-state-text {
                font-size: 14px;
            }

            .scroll-bottom-btn {
                position: fixed;
                bottom: 60px;
                right: 30px;
                width: 40px;
                height: 40px;
                border-radius: 50%;
                background: var(--accent-blue);
                color: white;
                border: none;
                cursor: pointer;
                display: none;
                align-items: center;
                justify-content: center;
                font-size: 18px;
                box-shadow: 0 4px 12px rgba(108, 140, 255, 0.3);
                transition: all var(--transition);
                z-index: 10;
            }
            .scroll-bottom-btn:hover {
                transform: scale(1.1);
                box-shadow: 0 6px 20px rgba(108, 140, 255, 0.4);
            }
            .scroll-bottom-btn.visible {
                display: flex;
            }

            .footer {
                background: var(--bg-secondary);
                border-top: 1px solid var(--border-color);
                padding: 6px 20px;
                font-size: 11px;
                color: var(--text-muted);
                display: flex;
                align-items: center;
                justify-content: space-between;
                flex-shrink: 0;
            }

            .footer-left {
                flex: 1;
                text-align: left;
            }

            .footer-right {
                flex: 1;
                text-align: right;
            }

            .dashboard {
                background: var(--bg-secondary);
                border-bottom: 1px solid var(--border-color);
                padding: 10px 16px;
                display: flex;
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                gap: 16px;
                flex-shrink: 0;
            }

            .dashboard-info {
                display: flex;
                flex-direction: column;
                gap: 6px;
                flex: 1;
            }

            .dashboard-row {
                display: flex;
                align-items: center;
                gap: 16px;
                flex-wrap: wrap;
            }

            .dashboard-item {
                display: flex;
                flex-direction: column;
                gap: 2px;
            }

            .dashboard-label {
                font-size: 11px;
                font-weight: 700;
                color: var(--text-muted);
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }

            .dashboard-value {
                font-size: 15px;
                font-weight: 600;
                color: var(--text-primary);
                font-family: var(--font-mono);
            }

            .stats-container {
                display: flex;
                gap: 8px;
                background: var(--bg-tertiary);
                padding: 6px 12px;
                border-radius: var(--radius);
                border: 1px solid var(--border-color);
            }

            .stat-box {
                display: flex;
                flex-direction: column;
                align-items: center;
                min-width: 42px;
            }

            .stat-label {
                font-size: 10px;
                font-weight: 700;
                color: var(--text-muted);
                margin-bottom: 2px;
            }

            .stat-value {
                font-size: 14px;
                font-weight: 700;
                color: var(--accent-blue);
            }

            .aptitude-table {
                width: auto;
                min-width: 300px;
                border-collapse: collapse;
                background: var(--bg-tertiary);
                border-radius: var(--radius);
                overflow: hidden;
                border: 1px solid var(--border-color);
                font-size: 11px;
            }

            .aptitude-table th,
            .aptitude-table td {
                padding: 4px 8px;
                text-align: center;
                border: 1px solid var(--border-color);
            }

            .aptitude-table th {
                background: rgba(255, 255, 255, 0.03);
                color: var(--text-secondary);
                font-weight: 600;
                font-size: 10px;
                text-transform: uppercase;
                width: 100px;
            }

            .aptitude-cell {
                display: inline-flex;
                flex-direction: column;
                align-items: center;
                gap: 2px;
                margin: 0 8px;
            }

            .aptitude-name {
                font-size: 11px;
                color: var(--text-muted);
                font-weight: 500;
            }

            .grade-badge {
                display: inline-block;
                width: 20px;
                height: 20px;
                line-height: 20px;
                text-align: center;
                border-radius: 4px;
                font-weight: 800;
                font-size: 13px;
                background: #333;
                color: #fff;
            }

            .grade-S {
                background: #ff4d4d;
                box-shadow: 0 0 5px rgba(255, 77, 77, 0.5);
            }
            .grade-A {
                background: #ff8533;
            }
            .grade-B {
                background: #ffcc00;
                color: #000;
            }
            .grade-C {
                background: #33cc33;
            }
            .grade-D {
                background: #3399ff;
            }
            .grade-E {
                background: #9933ff;
            }
            .grade-F {
                background: #666;
            }
            .grade-G {
                background: #444;
            }

            @media (max-width: 768px) {
                .header {
                    padding: 10px 12px;
                }
                .dashboard {
                    padding: 6px 10px;
                    flex-direction: row;
                    gap: 8px;
                    align-items: center;
                    justify-content: space-between;
                }
                .dashboard-info {
                    width: auto;
                    align-items: flex-end;
                    gap: 4px;
                }
                .dashboard-row {
                    gap: 8px;
                    justify-content: flex-end;
                    width: auto;
                }
                .stats-container {
                    padding: 3px 6px;
                    gap: 4px;
                    width: auto;
                }
                .stat-box {
                    min-width: 30px;
                }
                .stat-label {
                    font-size: 8px;
                }
                .stat-value {
                    font-size: 11px;
                }
                .dashboard-label {
                    font-size: 8px;
                }
                .dashboard-value {
                    font-size: 11px;
                }
                .aptitude-table {
                    font-size: 8px;
                    width: auto;
                    min-width: 0;
                }
                .aptitude-table th,
                .aptitude-table td {
                    padding: 1px 3px;
                }
                .aptitude-table th {
                    width: 45px;
                }
                .aptitude-cell {
                    margin: 0 1px;
                }
                .aptitude-name {
                    font-size: 8px;
                }
                .grade-badge {
                    width: 14px;
                    height: 14px;
                    line-height: 14px;
                    font-size: 9px;
                }
                .toolbar-content {
                    padding: 8px 12px;
                }
                .log-container {
                    padding: 8px 12px;
                }
                .footer {
                    padding: 6px 12px;
                }
                .logo-sub {
                    display: none;
                }
                .search-container {
                    min-width: 140px;
                }
            }
        </style>
    </head>
    <body>
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <div>
                    <div class="logo">Uma Android Automation</div>
                    <div class="logo-sub">Remote Log Viewer</div>
                </div>
            </div>
            <!-- Connection status indicator badge. -->
            <div id="statusBadge" class="status-badge status-connecting">
                <div class="status-dot"></div>
                <span id="statusText">Connecting</span>
            </div>
        </header>

        <!-- Dashboard -->
        <div class="dashboard">
            <table class="aptitude-table">
                <tr>
                    <th>Terrain</th>
                    <td id="rowTerrain">
                        <div class="aptitude-cell"><span class="aptitude-name">Turf</span><span id="aptTurf" class="grade-badge grade-G">-</span></div>
                        <div class="aptitude-cell"><span class="aptitude-name">Dirt</span><span id="aptDirt" class="grade-badge grade-G">-</span></div>
                    </td>
                </tr>
                <tr>
                    <th>Distance</th>
                    <td id="rowDistance">
                        <div class="aptitude-cell"><span class="aptitude-name">Sprint</span><span id="aptSprint" class="grade-badge grade-G">-</span></div>
                        <div class="aptitude-cell"><span class="aptitude-name">Mile</span><span id="aptMile" class="grade-badge grade-G">-</span></div>
                        <div class="aptitude-cell"><span class="aptitude-name">Medium</span><span id="aptMedium" class="grade-badge grade-G">-</span></div>
                        <div class="aptitude-cell"><span class="aptitude-name">Long</span><span id="aptLong" class="grade-badge grade-G">-</span></div>
                    </td>
                </tr>

        <!-- Log container -->
        <div class="log-container" id="logContainer">
            <!-- Empty state displayed when no logs are present. -->
            <div class="empty-state" id="emptyState">
                <div class="empty-state-icon">📡</div>
                <div class="empty-state-text">Waiting for log messages...</div>
            </div>
        </div>

        <!-- Scroll-to-bottom button -->
        <button class="scroll-bottom-btn" id="scrollBottomBtn" onclick="scrollToBottom()">↓</button>

        <!-- Footer -->
        <footer class="footer">
            <span class="footer-left">Uma Android Automation - Remote Log Viewer</span>
            <span id="footerInfo" class="footer-right"></span>
        </footer>

        <script>
            // ==============================================
            // State
            // ==============================================
            let ws = null
            let autoScroll = true
            let messageCount = 0
            let visibleMessageCount = 0
            let allMessages = []
            let activeFilters = new Set(["VERBOSE", "DEBUG", "INFO", "WARN", "ERROR"])
            let searchQuery = ""
            let isFiltering = false
            let reconnectAttempts = 0
            let reconnectInterval = null
            const maxReconnectDelay = 30000

            // DOM references.
            const logContainer = document.getElementById("logContainer")
            const emptyState = document.getElementById("emptyState")
            const messageCountEl = document.getElementById("messageCount")
            const statusBadge = document.getElementById("statusBadge")
            const statusText = document.getElementById("statusText")
            const searchInput = document.getElementById("searchInput")
            const searchClear = document.getElementById("searchClear")
            const scrollBottomBtn = document.getElementById("scrollBottomBtn")
            const autoScrollBtn = document.getElementById("autoScrollBtn")
            const fontSizeInput = document.getElementById("fontSizeInput")
            const footerInfo = document.getElementById("footerInfo")

            let currentFontSize = 12.5 // Default font size in pixels.

            /**
             * Updates the message count display.
             */
            function updateMessageCountDisplay() {
                if (visibleMessageCount === messageCount) {
                    messageCountEl.textContent = messageCount
                } else {
                    messageCountEl.textContent = visibleMessageCount + " / " + messageCount
                }
            }

            // ==============================================
            // WebSocket Connection
            // ==============================================

            /**
             * Initializes the WebSocket connection and sets up event handlers.
             */
            function connect() {
                if (reconnectAttempts > 0) {
                    setStatus("connecting", "Reconnecting in 5...")
                } else {
                    setStatus("connecting", "Connecting...")
                }

                const protocol = location.protocol === "https:" ? "wss:" : "ws:"
                const wsUrl = protocol + "//" + location.host

                ws = new WebSocket(wsUrl)

                ws.onopen = function () {
                    if (reconnectInterval) clearInterval(reconnectInterval)
                    setStatus("connected")
                    reconnectAttempts = 0
                    footerInfo.textContent = "Connected to " + location.host

                    // Clear the display on a fresh connection. This removes logs from
                    // a previous run, and prevents duplicate logs from being appended
                    // when the server resyncs the history buffer over this new connection.
                    clearDisplay()
                }

                ws.onmessage = function (event) {
                    if (event.data === "HISTORY_DONE") {
                        setTimeout(function () {
                            processAllHistoryForDashboard()
                        }, 10)
                    } else if (event.data.startsWith("HISTORY_BATCH:")) {
                        var msgs = event.data.substring(14).split("---LOG_SEPARATOR---")
                        setTimeout(function () {
                            appendHistoryBatch(msgs)
                        }, 10)
                    } else if (event.data.startsWith("BATCH:")) {
                        var msgs = event.data.substring(6).split("---LOG_SEPARATOR---")
                        // Yield to the browser renderer using setTimeout so "Connected" paints instantly
                        // before processing the heavy DOM insertions of the log messages.
                        setTimeout(function () {
                            appendBatchMessages(msgs)
                        }, 10)
                    } else {
                        // Process individual log messages.
                        appendLogMessage(event.data)
                    }
                }

                ws.onclose = function () {
                    setStatus("disconnected")
                    scheduleReconnect()
                }

                ws.onerror = function () {
                    setStatus("disconnected")
                }
            }

            /**
             * Schedules a reconnection attempt when the WebSocket connection is lost.
             */
            function scheduleReconnect() {
                if (reconnectInterval) {
                    clearInterval(reconnectInterval)
                }

                reconnectAttempts++
                var countdown = 5

                // Update the footer to show connection is lost
                footerInfo.textContent = "Connection lost. Retrying..."

                // Start countdown immediately and tick every second
                setStatus("connecting", `Reconnecting in ${countdown}...`)
                reconnectInterval = setInterval(function () {
                    countdown--
                    if (countdown > 0) {
                        setStatus("connecting", `Reconnecting in ${countdown}...`)
                    } else {
                        clearInterval(reconnectInterval)
                        setStatus("connecting", "Connecting...")
                        connect()
                    }
                }, 1000)
            }

            /**
             * Updates the UI status badge to reflect the current connection state.
             * @param {string} status - The current connection status (e.g., "connected", "disconnected").
             */
            function setStatus(status, customText) {
                statusBadge.className = "status-badge status-" + status
                statusText.textContent = customText || status.charAt(0).toUpperCase() + status.slice(1)
            }

            // ==============================================
            // Log Message Handling
            // ==============================================

            /**
             * Identifies the log severity level based on the message content.
             * @param {string} message - The raw log message text.
             * @returns {string} The identified log level (DEBUG, INFO, WARN, ERROR, VERBOSE).
             */
            function detectLevel(message) {
                if (message.indexOf("[ERROR]") !== -1) return "ERROR"
                if (message.indexOf("[WARN]") !== -1) return "WARN"
                if (message.indexOf("[INFO]") !== -1) return "INFO"
                if (message.indexOf("[VERBOSE]") !== -1) return "VERBOSE"
                return "DEBUG"
            }

            /**
             * Parses a raw log string into its component parts for structured display.
             * @param {string} message - The raw log message string.
             * @returns {object} An object containing the parsed timestamp, level, and text.
             */
            function parseMessage(message) {
                // Match patterns like "00:12:34.567 [DEBUG] rest of message".
                // Using \s* after timestamp to handle cases where the space might be missing.
                var match = message.match(/^(\n?)([\d]{2}:[\d]{2}:[\d]{2}\.[\d]{3})\s*(\[(?:VERBOSE|DEBUG|INFO|WARN|ERROR)\])\s*(.*)/s)
                if (match) {
                    return {
                        newline: match[1],
                        timestamp: match[2],
                        levelTag: match[3],
                        level: match[3].replace(/[\[\]]/g, ""),
                        text: match[4],
                    }
                }

                // Fallback: detect level and treat entire message as text.
                var level = detectLevel(message)
                return { newline: "", timestamp: "", levelTag: "", level: level, text: message }
            }

            /**
             * Processes and appends a single log message to the log container.
             * @param {string} rawMessage - The raw log message string received from the server.
             */
            function appendLogMessage(rawMessage) {
                if (!rawMessage) return
                messageCount++

                // Hide empty state on first message.
                if (emptyState) {
                    emptyState.style.display = "none"
                }

                var parsed = parseMessage(rawMessage)
                allMessages.push({ raw: rawMessage, parsed: parsed })

                // Handle special messages for dashboard updates immediately for individual messages.
                processSpecialLogs(parsed)

                var entry = createLogEntry(rawMessage, parsed)
                if (!entry.classList.contains("hidden")) {
                    visibleMessageCount++
                }
                logContainer.appendChild(entry)
                updateMessageCountDisplay()

                // Auto-scroll to bottom.
                if (autoScroll) {
                    scrollToBottom()
                }
            }

            /**
             * Efficiently append a batch of log messages using a DocumentFragment and atomic dashboard updates.
             * @param {Array<string>} rawMessages Array of raw log message strings.
             */
            function appendBatchMessages(rawMessages) {
                if (!rawMessages || rawMessages.length === 0) return

                var validMessages = rawMessages.filter(function (m) {
                    return m
                })
                if (validMessages.length === 0) return

                messageCount += validMessages.length

                if (emptyState) {
                    emptyState.style.display = "none"
                }

                var fragment = document.createDocumentFragment()
                
                // Track dashboard state changes across the batch to apply them once at the end.
                var batchState = {
                    name: null,
                    date: null,
                    turn: null,
                    stats: {},
                    apts: {}
                }

                validMessages.forEach(function (rawMessage) {
                    try {
                        var parsed = parseMessage(rawMessage)
                        allMessages.push({ raw: rawMessage, parsed: parsed })
                        
                        // Collect updates into the batch state object.
                        processSpecialLogs(parsed, batchState)
                        
                        var entry = createLogEntry(rawMessage, parsed)
                        if (!entry.classList.contains("hidden")) {
                            visibleMessageCount++
                        }
                        fragment.appendChild(entry)
                    } catch (e) {
                        console.error("Error processing log in batch:", e, rawMessage)
                    }
                })

                logContainer.appendChild(fragment)
                updateMessageCountDisplay()
                
                // Apply the final accumulated state from this batch to the DOM.
                applyBatchStateToDashboard(batchState)

                if (autoScroll) {
                    scrollToBottom()
                }
            }

            /**
             * Efficiently prepends a batch of history log messages using a DocumentFragment.
             * @param {Array<string>} rawMessages Array of raw log message strings in reverse chronological order.
             */
            function appendHistoryBatch(rawMessages) {
                if (!rawMessages || rawMessages.length === 0) return

                var validMessages = rawMessages.filter(function (m) {
                    return m
                })
                if (validMessages.length === 0) return

                messageCount += validMessages.length

                if (emptyState) {
                    emptyState.style.display = "none"
                }

                // Reverse back to chronological order for this batch.
                validMessages.reverse()

                var fragment = document.createDocumentFragment()
                var batchArray = []

                validMessages.forEach(function (rawMessage) {
                    try {
                        var parsed = parseMessage(rawMessage)
                        batchArray.push({ raw: rawMessage, parsed: parsed })
                        
                        var entry = createLogEntry(rawMessage, parsed)
                        if (!entry.classList.contains("hidden")) {
                            visibleMessageCount++
                        }
                        fragment.appendChild(entry)
                    } catch (e) {
                        console.error("Error processing log in history batch:", e, rawMessage)
                    }
                })

                // Prepend this batch to allMessages to maintain overall chronological order.
                allMessages = batchArray.concat(allMessages)

                // Save current scroll state before prepending.
                var previousScrollHeight = logContainer.scrollHeight;
                var previousScrollTop = logContainer.scrollTop;

                // Insert at the beginning of the container.
                if (logContainer.firstChild) {
                    logContainer.insertBefore(fragment, logContainer.firstChild)
                } else {
                    logContainer.appendChild(fragment)
                }
                updateMessageCountDisplay()
                
                // Adjust scroll position to counteract the prepended elements
                // so the current view doesn't jump around.
                var newScrollHeight = logContainer.scrollHeight;
                if (previousScrollHeight > 0) {
                    logContainer.scrollTop = previousScrollTop + (newScrollHeight - previousScrollHeight);
                }
            }

            /**
             * Processes all historical messages chronologically to build the latest dashboard state,
             * then applies it to the dashboard.
             */
            function processAllHistoryForDashboard() {
                var batchState = {
                    name: null,
                    date: null,
                    turn: null,
                    stats: {},
                    apts: {}
                }
                
                // allMessages is guaranteed to be in chronological order at this point.
                allMessages.forEach(function (msg) {
                    processSpecialLogs(msg.parsed, batchState)
                })
                
                applyBatchStateToDashboard(batchState)
                
                if (autoScroll) {
                    scrollToBottom()
                }
            }

            /**
             * Creates a DOM element representation of a log entry.
             * @param {string} rawMessage - The original unparsed log message.
             * @param {object} parsed - The parsed message components.
             * @returns {HTMLElement} The constructed log entry element.
             */
            function createLogEntry(rawMessage, parsed) {
                var entry = document.createElement("div")
                entry.className = "log-entry level-" + parsed.level.toLowerCase()
                entry.dataset.level = parsed.level

                var html = ""
                if (parsed.timestamp) {
                    html += '<span class="log-timestamp">' + escapeHtml(parsed.timestamp) + "</span>"
                }
                if (parsed.levelTag) {
                    html += '<span class="level-tag">' + escapeHtml(parsed.levelTag) + "</span>"
                }
                html += '<span class="log-text">' + escapeHtml(parsed.text) + "</span>"

                entry.innerHTML = html

                // Apply current filters.
                if (!activeFilters.has(parsed.level)) {
                    entry.classList.add("hidden")
                }
                if (searchQuery && !rawMessage.toLowerCase().includes(searchQuery)) {
                    entry.classList.add("hidden")
                }
                return entry
            }

            /**
             * Escapes HTML special characters to prevent Cross-Site Scripting (XSS) attacks.
             * @param {string} text - The input text to be escaped.
             * @returns {string} The HTML-safe escaped string.
             */
            function escapeHtml(text) {
                var div = document.createElement("div")
                div.appendChild(document.createTextNode(text))
                return div.innerHTML
            }

            // ==============================================
            // Toolbar Actions
            // ==============================================

            /**
             * Toggles a specific log level filter on or off.
             * @param {string} level - The log level to toggle.
             * @param {HTMLElement} btn - The button element that was clicked.
             */
            function toggleFilter(level, btn) {
                if (activeFilters.has(level)) {
                    activeFilters.delete(level)
                    btn.classList.remove("active")
                } else {
                    activeFilters.add(level)
                    btn.classList.add("active")
                }
                applyFilters()
            }

            /**
             * Iterates through all log entries and applies visibility based on active filters and search.
             */
            function applyFilters() {
                var entries = logContainer.querySelectorAll(".log-entry")

                // Temporarily flag that we are filtering so the scroll listener
                // doesn't falsely disable auto-scroll due to the container resizing.
                isFiltering = true

                var visibleCount = 0

                entries.forEach(function (entry) {
                    var level = entry.dataset.level
                    var matchesLevel = activeFilters.has(level)
                    var matchesSearch = !searchQuery || entry.textContent.toLowerCase().includes(searchQuery)
                    if (matchesLevel && matchesSearch) {
                        entry.classList.remove("hidden")
                        visibleCount++
                    } else {
                        entry.classList.add("hidden")
                    }
                })

                visibleMessageCount = visibleCount
                updateMessageCountDisplay()

                if (autoScroll) {
                    scrollToBottom()
                }

                // Reset the flag after the browser has a chance to process the resize-triggered scroll event.
                setTimeout(function () {
                    isFiltering = false
                }, 50)
            }

            /**
             * Enables or disables the automatic scrolling behavior for new logs.
             */
            function toggleAutoScroll() {
                autoScroll = !autoScroll
                autoScrollBtn.classList.toggle("active", autoScroll)
                if (autoScroll) {
                    scrollToBottom()
                }
            }

            /**
             * Forces the log container to scroll to the very bottom.
             */
            function scrollToBottom() {
                logContainer.scrollTop = logContainer.scrollHeight
            }

            /**
             * Copies the content of all currently stored log messages to the clipboard.
             */
            function copyAllLogs() {
                var text = allMessages
                    .map(function (m) {
                        return m.raw
                    })
                    .join("\n")
                navigator.clipboard.writeText(text).then(function () {
                    // Briefly flash the button to confirm.
                    var btn = event.target.closest(".toolbar-btn")
                    if (btn) {
                        var original = btn.textContent
                        btn.textContent = "✓ Copied!"
                        setTimeout(function () {
                            btn.innerHTML = "📋 Copy"
                        }, 1500)
                    }
                })
            }

            /**
             * Removes all log entries from the display and resets the local message store.
             */
            function clearDisplay() {
                // Remove all log entries but keep the empty state div.
                var entries = logContainer.querySelectorAll(".log-entry")
                entries.forEach(function (entry) {
                    entry.remove()
                })
                allMessages = []
                messageCount = 0
                visibleMessageCount = 0
                updateMessageCountDisplay()

                // Reset the trainee name display.
                document.getElementById("dashboardName").textContent = "-"

                // Show empty state again.
                if (emptyState) {
                    emptyState.style.display = "flex"
                }
            }

            // ==============================================
            // Font Size Adjustment
            // ==============================================

            /**
             * Increments or decrements the font size.
             * @param {number} delta - The amount to change the size by.
             */
            function adjustFontSize(delta) {
                updateFontSize(currentFontSize + delta)
            }

            /**
             * Updates the font size based on numeric input.
             * @param {number} value - The new font size in pixels.
             */
            function updateFontSize(value) {
                currentFontSize = parseFloat(value)
                if (isNaN(currentFontSize)) return

                // Constrain value.
                if (currentFontSize < 8) currentFontSize = 8
                if (currentFontSize > 24) currentFontSize = 24

                logContainer.style.setProperty("--log-font-size", currentFontSize + "px")
                fontSizeInput.value = currentFontSize

                // Persist preference.
                localStorage.setItem("uaa_log_font_size", currentFontSize)
            }

            /**
             * Initializes the font size from stored preference or default.
             */
            function initFontSize() {
                const storedSize = localStorage.getItem("uaa_log_font_size")
                if (storedSize !== null) {
                    const parsedSize = parseFloat(storedSize)
                    if (!isNaN(parsedSize)) {
                        currentFontSize = parsedSize
                    }
                }
                updateFontSize(currentFontSize)
            }

            // ==============================================
            // Search Input Handler
            // ==============================================

            // Listen for input changes in the search field to filter logs in real-time.
            searchInput.addEventListener("input", function () {
                searchQuery = this.value.toLowerCase().trim()
                searchClear.classList.toggle("visible", this.value.length > 0)
                applyFilters()
            })

            // Listen for click on the clear button to reset search.
            searchClear.addEventListener("click", function () {
                searchInput.value = ""
                searchQuery = ""
                this.classList.remove("visible")
                applyFilters()
                searchInput.focus()
            })

            // ==============================================
            // Scroll Detection — Show/hide scroll-to-bottom
            // ==============================================

            // Listen for font size change.
            fontSizeInput.addEventListener("input", function () {
                updateFontSize(this.value)
            })

            // Monitor log container scrolling to toggle auto-scroll and show/hide the scroll-to-bottom button.
            logContainer.addEventListener("scroll", function () {
                // Prevent filters from falsely triggering manual text scroll-up detections.
                if (isFiltering) return

                var threshold = 100
                var atBottom = logContainer.scrollHeight - logContainer.scrollTop - logContainer.clientHeight < threshold

                // Show the scroll-to-bottom button if not at the bottom.
                scrollBottomBtn.classList.toggle("visible", !atBottom)

                // If user manually scrolled up, disable auto-scroll.
                if (!atBottom && autoScroll) {
                    autoScroll = false
                    autoScrollBtn.classList.remove("active")
                } else if (atBottom && !autoScroll) {
                    autoScroll = true
                    autoScrollBtn.classList.add("active")
                }
            })

            // ==============================================
            // Dashboard
            // ==============================================

            /**
             * Converts a turn number to a descriptive date string.
             */
            function dateFromDay(day) {
                const d = day - 1
                const y = Math.floor(d / 24)
                const m = Math.floor((d % 24) / 2)
                const p = d % 2

                const years = ["Junior Year", "Classic Year", "Senior Year"]
                const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"]
                const phases = ["Early", "Late"]

                return `${years[y]} ${phases[p]} ${months[m]}`
            }

            /**
             * Processes logs for special dashboard updates.
             * @param {object} parsed - The parsed log object.
             * @param {object} stateTarget - Optional state object to update instead of the DOM.
             */
            function processSpecialLogs(parsed, stateTarget = null) {
                const text = parsed.text

                // Detect and extract Turn information.
                const turnMatch = text.match(/(?:\(|Turn\s*)(\d+)\)?/i)
                const turnsRemainingMatch = text.match(/Detected day for extra racing: (\d+)/i)

                const dashboardDateEl = document.getElementById("dashboardDate")
                const dashboardTurnEl = document.getElementById("dashboardTurn")

                // Handle absolute turn numbers: "(Turn 48)" or "Turn 48".
                if (turnMatch && (text.includes("[DATE]") || text.includes("fromDateString"))) {
                    if (stateTarget) {
                        stateTarget.turn = turnMatch[1]
                    } else {
                        dashboardTurnEl.textContent = turnMatch[1]
                    }
                }
                // Handle "turns remaining" logs: ONLY during Pre-Debut.
                // These logs represent turns left until the next goal.
                else if (turnsRemainingMatch) {
                    // Check if we are in Pre-Debut.
                    let isPreDebut = false
                    if (stateTarget && stateTarget.date) {
                        isPreDebut = stateTarget.date.toLowerCase().includes("pre-debut")
                    } else if (dashboardDateEl) {
                        isPreDebut = dashboardDateEl.textContent.toLowerCase().includes("pre-debut")
                    }

                    if (isPreDebut) {
                        const turnsRemaining = parseInt(turnsRemainingMatch[1])
                        // Pre-Debut has 12 turns. Turn = 12 - turnsRemaining.
                        const absoluteTurn = Math.max(1, 12 - turnsRemaining)
                        
                        if (stateTarget) {
                            stateTarget.turn = absoluteTurn
                            stateTarget.date = idToTitleCase(dateFromDay(absoluteTurn))
                        } else {
                            dashboardTurnEl.textContent = absoluteTurn
                            dashboardDateEl.textContent = idToTitleCase(dateFromDay(absoluteTurn))
                        }
                    }
                }

                // Parse clean date.
                if (text.includes("fromDateString:: Detected")) {
                    const dateMatch = text.match(/fromDateString:: Detected (.*?) (?:\(Turn|\d)/)
                    if (dateMatch) {
                        const dateStr = dateMatch[1].trim().replace(/^FINALS\s+/i, "Finale ")
                        if (stateTarget) {
                            stateTarget.date = idToTitleCase(dateStr)
                        } else {
                            dashboardDateEl.textContent = idToTitleCase(dateStr)
                        }
                    }
                }
                // Handle "Detected date: ..." logs.
                else if (text.includes("Detected date:")) {
                    const dateMatch = text.match(/Detected date:\s*(.*?)(\s*\(Turn|$)/i)
                    if (dateMatch) {
                        let dateStr = dateMatch[1].trim().replace(/^FINALS\s+/i, "Finale ")

                        // If in Pre-Debut, calculate a more descriptive date from the current turn.
                        let currentTurn = "-"
                        if (stateTarget && stateTarget.turn) {
                            currentTurn = stateTarget.turn.toString()
                        } else {
                            currentTurn = dashboardTurnEl.textContent
                        }

                        if (dateStr.toLowerCase().includes("pre-debut") && currentTurn !== "-") {
                            const day = parseInt(currentTurn)
                            if (!isNaN(day) && day > 0) {
                                dateStr = dateFromDay(day)
                            }
                        }

                        if (stateTarget) {
                            stateTarget.date = idToTitleCase(dateStr)
                        } else {
                            dashboardDateEl.textContent = idToTitleCase(dateStr)
                        }
                    }
                }
                // Fallback for generic [DATE] logs.
                else if (text.includes("[DATE]") && !text.includes("getFinalsDay")) {
                    // Match generic date skipping "New date:" and requiring "(Turn X)".
                    const dateMatch = text.match(/\[DATE\]\s*(?:New date:\s*)?(.*?)(\s*\(Turn\s*\d+\))/i)
                    if (dateMatch) {
                        const dateStr = dateMatch[1].trim().replace(/^FINALS\s+/i, "Finale ")
                        if (stateTarget) {
                            stateTarget.date = idToTitleCase(dateStr)
                        } else {
                            dashboardDateEl.textContent = idToTitleCase(dateStr)
                        }
                    }
                }

                // Parse detailed trainee info: "[TRAINEE_DETAILED] Stats: Spd=764, Sta=910, Pow=679, Gut=355, Wit=280".
                if (text.includes("[TRAINEE_DETAILED]")) {
                    const typeMatch = text.match(/\[TRAINEE_DETAILED\]\s*([^:]+):\s*(.*)/)
                    if (typeMatch) {
                        updateDashboard(typeMatch[1], typeMatch[2], stateTarget)
                    }
                }
            }

            /**
             * Helper to apply a collected batch state to the dashboard DOM.
             * @param {object} state - The collected state from the batch.
             */
            function applyBatchStateToDashboard(state) {
                if (state.name) {
                    document.getElementById("dashboardName").textContent = state.name
                }
                if (state.date) {
                    document.getElementById("dashboardDate").textContent = state.date
                }
                if (state.turn) {
                    document.getElementById("dashboardTurn").textContent = state.turn
                }
                
                // Batch update stats.
                for (const [key, val] of Object.entries(state.stats)) {
                    const elId = { Spd: "statSpeed", Sta: "statStamina", Pow: "statPower", Gut: "statGuts", Wit: "statWit" }[key]
                    if (elId) {
                        const el = document.getElementById(elId)
                        if (el && el.textContent !== val) el.textContent = val
                    }
                }
                
                // Batch update aptitudes.
                for (const [name, grade] of Object.entries(state.apts)) {
                    const elId = "apt" + name
                    const el = document.getElementById(elId)
                    if (el && el.textContent !== grade) {
                        el.textContent = grade
                        el.className = "grade-badge grade-" + (grade || "G")
                    }
                }
            }

            /**
             * Helper to convert uppercase strings to Title Case and shorten months.
             */
            function idToTitleCase(str) {
                const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"]

                return str
                    .toLowerCase()
                    .split(" ")
                    .map((word) => {
                        let titleCase = word.split("-").map(part => part.charAt(0).toUpperCase() + part.slice(1)).join("-")
                        // Shorten month if it's a full month name.
                        const monthIndex = months.findIndex((m) => m === titleCase)
                        if (monthIndex !== -1) {
                            return months[monthIndex].slice(0, 3)
                        }
                        return titleCase
                    })
                    .join(" ")
            }

            /**
             * Updates the dashboard with new trainee data.
             * @param {string} category - The data category (Stats, Track, Distance, Style).
             * @param {string} data - The raw data string.
             * @param {object} stateTarget - Optional state object to update instead of the DOM.
             */
            function updateDashboard(category, data, stateTarget = null) {
                if (category === "Name") {
                    if (stateTarget) {
                        stateTarget.name = data.trim()
                    } else {
                        document.getElementById("dashboardName").textContent = data.trim()
                    }
                } else if (category === "Stats") {
                    const stats = data.split(", ")
                    stats.forEach((s) => {
                        const [key, val] = s.split("=")
                        if (stateTarget) {
                            stateTarget.stats[key] = val
                        } else {
                            const elId = { Spd: "statSpeed", Sta: "statStamina", Pow: "statPower", Gut: "statGuts", Wit: "statWit" }[key]
                            if (elId) document.getElementById(elId).textContent = val
                        }
                    })
                } else {
                    const apts = data.split(", ")
                    apts.forEach((a) => {
                        const [name, grade] = a.split("=")
                        if (stateTarget) {
                            stateTarget.apts[name] = grade
                        } else {
                            const elId = "apt" + name
                            const el = document.getElementById(elId)
                            if (el) {
                                el.textContent = grade
                                el.className = "grade-badge grade-" + (grade || "G")
                            }
                        }
                    })
                }
            }

            /**
             * Collapses or expands the toolbar section.
             */
            function toggleToolbar() {
                const toolbar = document.getElementById("toolbar")
                const isCollapsed = toolbar.classList.toggle("collapsed")
                localStorage.setItem("toolbarCollapsed", isCollapsed)
            }

            /**
             * Loads the toolbar collapse state from local storage.
             */
            function initToolbar() {
                const isCollapsed = localStorage.getItem("toolbarCollapsed") === "true"
                if (isCollapsed) {
                    document.getElementById("toolbar").classList.add("collapsed")
                }
            }

            /**
             * Handles log downloading by fetching from the server endpoint.
             */
            function downloadLogs() {
                const traineeName = document.getElementById("dashboardName").textContent.trim()
                const datePart = new Date().toISOString().slice(0, 19).replace(/[:T]/g, "-")

                // Prefer the server-side download for full, non-truncated logs.
                fetch("/logs/download")
                    .then((response) => {
                        if (!response.ok) throw new Error("Server download failed")
                        return response.blob()
                    })
                    .then((blob) => {
                        const url = URL.createObjectURL(blob)
                        const a = document.createElement("a")
                        a.href = url
                        // Use a descriptive filename.
                        if (traineeName && traineeName !== "-") {
                            a.download = `${traineeName}_${datePart}.txt`
                        } else {
                            a.download = `log @ ${datePart}.txt`
                        }
                        document.body.appendChild(a)
                        a.click()
                        document.body.removeChild(a)
                        URL.revokeObjectURL(url)
                    })
                    .catch((err) => {
                        console.error("Download error:", err)
                        // Fallback to local buffer if the server endpoint fails.
                        const content = allMessages.map((m) => m.raw).join("\n")
                        const blob = new Blob([content], { type: "text/plain" })
                        const url = URL.createObjectURL(blob)
                        const a = document.createElement("a")
                        a.href = url
                        a.download = `log @ ${datePart}.txt`
                        a.click()
                        URL.revokeObjectURL(url)
                    })
            }

            // Initiate the connection and settings when the page loads.
            initFontSize()
            initToolbar()
            connect()
        </script>
    </body>
</html>
